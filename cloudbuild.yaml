steps:
  - name: 'maven:3.9-eclipse-temurin-17'
    entrypoint: 'mvn'
    args: ['clean', 'package', '-DskipTests']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/proserv-task02/springboot-repo/hello-gke:v1'
      - '.'

images:
  - 'us-central1-docker.pkg.dev/proserv-task02/springboot-repo/hello-gke:v1'
