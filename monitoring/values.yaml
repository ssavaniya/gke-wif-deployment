      smtp_smarthost: smtp.gmail.com:587
      smtp_from: learndevops694@gmail.com
      smtp_auth_username: learndevops694@gmail.com
      smtp_auth_password: ufps ctcl ngmx nmxe
      smtp_require_tls: true

    route:
      receiver: email-notifications
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

      routes:
        - receiver: "null"
          matchers:
            - alertname="Watchdog"

    receivers:
      - name: email-notifications
        email_configs:
