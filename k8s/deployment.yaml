apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-gke

spec:
  replicas: 2

  selector:
    matchLabels:
      app: hello-gke

  template:
    metadata:
      labels:
        app: hello-gke

    spec:
      containers:
        - name: hello-gke
          image: IMAGE_PLACEHOLDER
          ports:
          - containerPort: 8080
