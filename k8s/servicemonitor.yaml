apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: hello-gke
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: hello-gke

  namespaceSelector:
    matchNames:
      - default

  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
