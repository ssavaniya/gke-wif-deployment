name: Build Scan Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  PROJECT_ID: proserv-task02
  REGION: us-central1
  REPOSITORY: springboot-repo
  IMAGE: hello-gke
  IMAGE_URI: us-central1-docker.pkg.dev/proserv-task02/springboot-repo/hello-gke

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/153524623211/locations/global/workloadIdentityPools/github-action/providers/github-action
          service_account: github-gke-deployer@proserv-task02.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Verify Helm
        run: |
          helm version

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: my-tf-cluster
          location: us-central1-a

      - name: Verify Environment
        run: |
          echo "===== gcloud ====="
          gcloud auth list
         
          echo "===== kubectl ====="
          kubectl get nodes
         
          echo "===== Helm ====="
          helm version
          
          echo "===== Kubernetes Context ====="
          kubectl config current-context
          
          echo "===== Namespace ====="
          kubectl get ns

      - name: Install / Upgrade Monitoring Platform
        run: |
          chmod +x platform/scripts/install-monitoring.sh
          ./platform/scripts/install-monitoring.sh

      - name: Validate Monitoring Platform
        run: |
          echo "===== Verifying Monitoring ====="

          kubectl get pods -n monitoring

          kubectl get servicemonitor hello-gke -n monitoring

          kubectl get prometheusrule hello-gke-alerts -n monitoring

          kubectl get ingress grafana -n monitoring

          echo "Monitoring validation successful."

      - name: Run Unit Tests
        run: |
          chmod +x mvnw
          ./mvnw clean test

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.organization=ssavaniya \
            -Dsonar.projectKey=ssavaniya_gke-wif-deployment \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${SONAR_TOKEN} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: Build Application
        run: |
          ./mvnw package -DskipTests

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ env.IMAGE_URI }}:${{ github.sha }} .

      - name: Verify Trivy Installation
        run: |
          trivy --version

      - name: Cache Trivy Database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}
          restore-keys: |
            trivy-db-

      - name: Run Trivy SARIF Scan
        run: |
          trivy image \
            --ignorefile .trivyignore \
            --format sarif \
            --output trivy-results.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            ${{ env.IMAGE_URI }}:${{ github.sha }}

      - name: Upload SARIF Report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Generate Trivy JSON Report
        run: |
          trivy image \
            --ignorefile .trivyignore \
            --format json \
            --output trivy-report.json \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            ${{ env.IMAGE_URI }}:${{ github.sha }}

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

      - name: Enforce Security Policy
        run: |
          trivy image \
            --ignorefile .trivyignore \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            ${{ env.IMAGE_URI }}:${{ github.sha }}

      - name: Configure Docker
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Push Docker Image
        run: |
          docker push ${{ env.IMAGE_URI }}:${{ github.sha }}

      - name: Deploy using Helm
        run: |
          helm upgrade --install hello-gke ./helm/hello-gke \
            --set image.repository=${{ env.IMAGE_URI }} \
            --set image.tag=${{ github.sha }}

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/hello-gke

      - name: Wait for Service Endpoints
        run: |
          echo "Waiting for Service endpoints..."
          for i in {1..30}; do
            EP=$(kubectl get endpoints hello-gke -o jsonpath='{.subsets[*].addresses[*].ip}' 2>/dev/null)

            if [ -n "$EP" ]; then
              echo "Endpoints Ready: $EP"
              exit 0
            fi

            sleep 5
          done

          kubectl get endpoints hello-gke
          exit 1

      - name: Show Deployment
        run: |
          kubectl describe deployment hello-gke

      - name: Debug Deployment
        run: |
          kubectl get pods -o wide
          kubectl get svc
          kubectl get endpoints
          kubectl describe svc hello-gke

      - name: Verify Application
        run: |
          echo "Waiting for application..."

          for i in {1..12}; do

            kubectl run curl-test \
              --image=curlimages/curl:8.12.1 \
              --rm \
              --restart=Never \
              --attach \
              -- curl --connect-timeout 5 --max-time 10 \
              http://hello-gke.default.svc.cluster.local && exit 0

            echo "Retrying..."
            sleep 10

          done

          kubectl get pods
          kubectl get svc
          kubectl get endpoints
          kubectl describe svc hello-gke

          exit 1

      - name: Port Forward Service
        run: |
          kubectl port-forward svc/hello-gke 8080:80 >/tmp/pf.log 2>&1 &
          sleep 10

      - name: Functional Test
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/tests:/etc/newman \
            postman/newman \
            run /etc/newman/hello-gke-functional.postman_collection.json \
            --env-var baseUrl=http://localhost:8080

      - name: Validate Application Monitoring
        run: |
          echo "========================================"
          echo "Validating Application Monitoring"
          echo "========================================"

          echo ""
          echo "1. Waiting for application rollout..."
          kubectl rollout status deployment/hello-gke \
            -n default \
            --timeout=300s

          echo ""
          echo "2. Verifying ServiceMonitor..."
          kubectl get servicemonitor hello-gke -n monitoring

          echo ""
          echo "3. Verifying PrometheusRule..."
          kubectl get prometheusrule hello-gke-alerts -n monitoring

          echo ""
          echo "4. Starting Prometheus port-forward..."
          kubectl port-forward \
            svc/monitoring-kube-prometheus-prometheus \
            -n monitoring \
            9090:9090 >/tmp/prometheus.log 2>&1 &

          sleep 20

          echo "Waiting for Prometheus API..."
          until curl -s http://localhost:9090/-/ready >/dev/null; do
            sleep 5
          done

          echo "Prometheus is ready."

          echo ""
          echo "5. Verifying JVM Metrics..."

          curl -sG \
            --data-urlencode 'query=jvm_memory_used_bytes' \
            http://localhost:9090/api/v1/query \
            | grep "jvm_memory_used_bytes" \
            || (echo "ERROR: JVM metrics not found"; exit 1)

          echo ""
          echo "6. Verifying HTTP Metrics..."

          curl -sG \
            --data-urlencode 'query=http_server_requests_seconds_count' \
            http://localhost:9090/api/v1/query \
            | grep "http_server_requests_seconds_count" \
            || (echo "ERROR: HTTP metrics not found"; exit 1)

          pkill -f "kubectl port-forward" || true

          echo ""
          echo "========================================"
          echo "Application Monitoring Validation Passed"
          echo "========================================"
          
      - name: Verify Deployment
        run: |
          kubectl get pods
          kubectl get svc
          helm list

      - name: Cleanup Runner
        if: always()
        run: |
          docker system prune -af
          rm -f trivy-results.sarif
          rm -f trivy-report.json
          rm -f /tmp/pf.log
