name: Build Scan Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  PROJECT_ID: proserv-task02
  REGION: us-central1
  REPOSITORY: springboot-repo
  IMAGE: hello-gke
  IMAGE_URI: us-central1-docker.pkg.dev/proserv-task02/springboot-repo/hello-gke

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/153524623211/locations/global/workloadIdentityPools/github-action/providers/github-action
          service_account: github-gke-deployer@proserv-task02.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: my-tf-cluster
          location: us-central1-a

      - name: Verify Environment
        run: |
          kubectl get nodes
          gcloud auth list

      - name: Run Unit Tests + Generate Coverage
        run: |
          chmod +x mvnw
          ./mvnw clean test

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.organization=ssavaniya \
            -Dsonar.projectKey=ssavaniya_gke-wif-deployment \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${SONAR_TOKEN} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: Build Application
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ env.IMAGE_URI }}:${{ github.sha }} .

      - name: Cache Trivy Database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}
          restore-keys: |
            trivy-db-

      - name: Run Trivy Scan (SARIF)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_URI }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
        continue-on-error: true

      - name: Upload SARIF Report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Generate Trivy JSON Report
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_URI }}:${{ github.sha }}
          format: json
          output: trivy-report.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

      - name: Enforce Security Policy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_URI }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          exit-code: "1"

      - name: Configure Docker
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Push Docker Image
        run: |
          docker push ${{ env.IMAGE_URI }}:${{ github.sha }}

      - name: Deploy using Helm
        run: |
          helm upgrade --install hello-gke ./helm/hello-gke \
            --set image.repository=${{ env.IMAGE_URI }} \
            --set image.tag=${{ github.sha }}

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/hello-gke

      - name: Port Forward
        run: |
          kubectl port-forward svc/hello-gke 8080:80 >/tmp/pf.log 2>&1 &
          sleep 15

      - name: Set BASE_URL
        run: |
          echo "BASE_URL=localhost:8080" >> $GITHUB_ENV

      - name: Functional Test
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/tests:/etc/newman \
            postman/newman \
            run /etc/newman/hello-gke-functional.postman_collection.json \
            --env-var baseUrl=http://${BASE_URL}

      - name: Verify Deployment
        run: |
          kubectl get pods
          kubectl get svc
          helm list

      - name: Cleanup Runner
        if: always()
        run: |
          echo "Cleaning Docker..."
          docker system prune -af

          echo "Cleaning Trivy reports..."
          rm -f trivy-results.sarif
          rm -f trivy-report.json
