name: Build Scan Deploy

on:
  push:
   branches:
     - main

env:
PROJECT_ID: proserv-task02
REGION: us-central1
REPOSITORY: springboot-repo
IMAGE: hello-gke
CLUSTER: my-tf-cluster
ZONE: us-central1-a

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: YOUR_WIF_PROVIDER
          service_account: YOUR_SERVICE_ACCOUNT

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build JAR
        run: |
          chmod +x mvnw
          ./mvnw clean package

      - name: Build Docker Image
        run: |
          docker build \
          -t us-central1-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE}:${{ github.sha }} .

      - name: Push Image
        run: |
          docker push \
          us-central1-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE}:${{ github.sha }}

      - name: Connect to GKE
        run: |
          gcloud container clusters get-credentials \
          ${CLUSTER} \
          --zone ${ZONE}

      - name: Deploy
        run: |
          kubectl set image deployment/hello-gke \
          hello-gke=us-central1-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE}:${{ github.sha }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/hello-gke
