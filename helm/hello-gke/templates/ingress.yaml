apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: hello-gke
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

spec:
  ingressClassName: nginx

  rules:
    - http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: hello-gke
                port:
                  number: {{ .Values.service.port }}
