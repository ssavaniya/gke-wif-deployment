apiVersion: apps/v1
kind: Deployment

metadata:
  name: hello-gke
  labels:
    app: hello-gke

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: hello-gke

  template:
    metadata:
      labels:
        app: hello-gke

    spec:
      containers:
        - name: hello-gke

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.service.targetPort }}

          resources:
{{ toYaml .Values.resources | indent 12 }}
