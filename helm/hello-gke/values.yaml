replicaCount: 1

image:
  repository: us-central1-docker.pkg.dev/proserv-task02/springboot-repo/hello-gke
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx

  host: hello-gke.136.65.71.135.sslip.io

  path: /
  pathType: Prefix

  clusterIssuer: letsencrypt-prod

  tls:
    enabled: true
    secretName: hello-gke-tls

resources:
  requests:
    cpu: 100m
    memory: 256Mi

  limits:
    cpu: 500m
    memory: 512Mi
